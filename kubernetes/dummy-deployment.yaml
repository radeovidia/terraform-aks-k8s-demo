apiVersion: v1
kind: Namespace
metadata:
  name: demo-app
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dummy-storage
  namespace: demo-app
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dummy-service
  namespace: demo-app
  labels:
    app.kubernetes.io/application: dummy-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dummy-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: dummy-service
    spec:
      containers:
      - name: dummy-service
        image: hashicorp/http-echo:0.2.3
        args:
          - "-text=Hello from Dummy Service"
        ports:
          - containerPort: 5678
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 200m
            memory: 128Mi
        volumeMounts:
          - mountPath: /data
            name: dummy-storage
      volumes:
        - name: dummy-storage
          persistentVolumeClaim:
            claimName: dummy-storage
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: dummy-service
  namespace: demo-app
  labels:
    app.kubernetes.io/application: dummy-service
spec:
  selector:
    app: dummy-service
  ports:
    - name: http
      port: 80
      targetPort: 5678
      protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dummy-service
  namespace: demo-app
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "10M"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  rules:
  - host: dummy.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: dummy-service
            port:
              number: 80